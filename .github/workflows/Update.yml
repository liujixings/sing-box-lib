name: Update sing-box version

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest sing-box version
        id: latest
        run: |
          latest_release=$(curl -fsSL "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name', ''))")
          latest_prerelease=$(curl -fsSL "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=50" | python3 -c "import json,sys; releases=json.load(sys.stdin); print(next((r['tag_name'] for r in releases if r.get('prerelease') and not r.get('draft') and r.get('tag_name')), ''))")
          if [ -z "$latest_release" ] || [ -z "$latest_prerelease" ]; then
            echo "failed to get latest versions"
            exit 1
          fi
          echo "release=$latest_release" >> $GITHUB_OUTPUT
          echo "prerelease=$latest_prerelease" >> $GITHUB_OUTPUT

      - name: Compare repository variables
        id: compare
        run: |
          current_release="${{ vars.RELEASE }}"
          current_prerelease="${{ vars.PRERELEASE }}"

          if [ "$current_release" != "${{ steps.latest.outputs.release }}" ]; then
            echo "release_update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "release_update_needed=false" >> $GITHUB_OUTPUT
          fi

          if [ "$current_prerelease" != "${{ steps.latest.outputs.prerelease }}" ]; then
            echo "prerelease_update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease_update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update release variable
        if: steps.compare.outputs.release_update_needed == 'true'
        run: |
          gh variable set RELEASE --body "${{ steps.latest.outputs.release }}"

      - name: Update prerelease variable
        if: steps.compare.outputs.prerelease_update_needed == 'true'
        run: |
          gh variable set PRERELEASE --body "${{ steps.latest.outputs.prerelease }}"

      - name: Repository Dispatch (release)
        if: steps.compare.outputs.release_update_needed == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: release
          client-payload: '{"version": "${{ steps.latest.outputs.release }}"}'

      - name: Repository Dispatch (prerelease)
        if: steps.compare.outputs.prerelease_update_needed == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: prerelease
          client-payload: '{"version": "${{ steps.latest.outputs.prerelease }}"}'
