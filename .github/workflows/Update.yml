name: Update sing-box version

on:
  schedule:
    - cron: "0 2 * * *" 
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest sing-box version
        run: |
          latest=$(curl -fsSL "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=20" | python3 -c "import json,sys; releases=json.load(sys.stdin); print(next((r['tag_name'] for r in releases if not r.get('draft') and r.get('tag_name')), ''))")
          if [ -z "$latest" ]; then
            echo "failed to get latest version"
            exit 1
          fi
          echo "latest_version=$latest" >> $GITHUB_ENV

      - name: Compare with local version
        run: |
          if [ -f version ]; then
            current=$(cat version)
          else
            current=""
          fi
          if [ "$current" != "${{ env.latest_version }}" ]; then
            echo "update_needed=true" >> $GITHUB_ENV
          else
            echo "update_needed=false" >> $GITHUB_ENV
          fi

      - name: Update version file
        if: env.update_needed == 'true'
        run: |
          echo "${{ env.latest_version }}" > version
  
      - name: Commit manifest & tag
        if: env.update_needed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sing-Box Release ${{ env.latest_version }}"
          commit_user_name: "liujixings"
          commit_user_email: "liujixings@outlook.com"
          file_pattern: version

      - name: Repository Dispatch
        if: env.update_needed == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: release
