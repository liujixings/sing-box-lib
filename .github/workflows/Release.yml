name: Build Sing-Box TIPA and xcframework

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'release 还是 prerelease'
        required: false
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'prerelease'
      version:
        description: '手动指定版本号，留空则使用仓库变量'
        required: false
        default: ''
        type: string
  repository_dispatch:
    types: [release, prerelease]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release target
        id: resolve
        run: |
          set -euo pipefail

          is_prerelease=false
          update_apple=false
          fallback_tag="${{ vars.RELEASE }}"

          if [[ "${{ github.event_name }}" == "repository_dispatch" && "${{ github.event.action }}" == "prerelease" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.release }}" == "prerelease" ]]; then
            is_prerelease=true
            update_apple=true
            fallback_tag="${{ vars.PRERELEASE }}"
          fi

          case "${{ github.event_name }}" in
            repository_dispatch)
              tag="${{ github.event.client_payload.version }}"
              ;;
            workflow_dispatch)
              if [ -n "${{ inputs.version }}" ]; then
                tag="${{ inputs.version }}"
              else
                tag="$fallback_tag"
              fi
              ;;
          esac

          if [ -z "$tag" ]; then
            echo "Version not found for current release target"
            exit 1
          fi

          tag_no_v="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_no_v=${tag_no_v}" >> "$GITHUB_OUTPUT"
          echo "update_apple=${update_apple}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "^1.25"
          #cache: true

      - name: Setup Xcode stable
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version >> "$GITHUB_STEP_SUMMARY"

      - name: Install ldid
        run: |
          brew list ldid &>/dev/null || brew install ldid

      - name: Build TIPA and xcframework
        id: build
        run: |
          set -euo pipefail
          cd "$HOME"

          echo "sing-box-${{ steps.resolve.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          git clone -b "${{ steps.resolve.outputs.tag }}" --recurse-submodules --depth 1 \
            https://github.com/SagerNet/sing-box.git

          cd "$HOME/sing-box"

          if [ "${{ steps.resolve.outputs.update_apple }}" = "true" ]; then
            rm -rf clients/apple
            git clone --recurse-submodules --depth 1 \
              https://github.com/SagerNet/sing-box-for-apple.git clients/apple
          fi

          export XCODEPROJ_NAME=sing-box
          export APPLICATION_NAME=sing-box
          export SCHEME_NAME=SFI

          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"

          go run ./cmd/internal/build_libbox -target apple -platform ios,tvos,macos
          zip -ry ./Libbox.xcframework.zip ./Libbox.xcframework
          cp ./Libbox.xcframework.zip "$GITHUB_WORKSPACE/Libbox.xcframework.zip"
          mv Libbox.xcframework clients/apple

          cd $HOME/sing-box/clients/apple

          xcodebuild \
            -project "$XCODEPROJ_NAME.xcodeproj" \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            build \
            STRIP_INSTALLED_PRODUCT=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_SERIALIZE_DEBUGGING_OPTIONS=NO

          APP_PATH="DerivedData/Build/Products/Release-iphoneos/$APPLICATION_NAME.app"
          ldid -SSFI/SFI.entitlements "$APP_PATH/$APPLICATION_NAME"
          ldid -SExtension/Extension.entitlements "$APP_PATH/PlugIns/Extension.appex/Extension"
          ldid -SIntentsExtension/IntentsExtension.entitlements "$APP_PATH/Extensions/IntentsExtension.appex/IntentsExtension"

          mkdir -p packages/Payload
          cp -rp "$APP_PATH" packages/Payload
          cd packages
          zip -qr sing-box.tipa Payload
          mv sing-box.tipa "$GITHUB_WORKSPACE/sing-box-${{ steps.resolve.outputs.tag_no_v }}.tipa"
          cd "$GITHUB_WORKSPACE"

          # Compute checksum for Package.swift
          checksum=$(shasum -a 256 Libbox.xcframework.zip | awk '{print $1}')
          echo "file_checksum=${checksum}" >> "$GITHUB_OUTPUT"

          printf 'SHA256 Checksum:\n%s\n' "$(shasum -a 256 "sing-box-${{ steps.resolve.outputs.tag_no_v }}.tipa")" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Update Package.swift
        run: |
          cat > Package.swift << EOF
          // swift-tools-version: 5.7

          import PackageDescription

          let package = Package(
            name: "Libbox",
            platforms: [.iOS(.v12)],
            products: [
              .library(name: "Libbox", targets: ["Libbox"]),
            ],
            targets: [
              .binaryTarget(
                name: "Libbox",
                url: "https://github.com/liujixings/sing-box-lib/releases/download/${{ steps.resolve.outputs.tag }}/Libbox.xcframework.zip",
                checksum: "${{ steps.build.outputs.file_checksum }}"
              )
            ]
          )
          EOF

      - name: Commit manifest & tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Libbox Release ${{ steps.resolve.outputs.tag }}"
          commit_user_name: "liujixings"
          commit_user_email: "liujixings@outlook.com"
          tagging_message: "${{ steps.resolve.outputs.tag }}"
          file_pattern: Package.swift

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.resolve.outputs.prerelease == 'true' }}
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.tag_no_v }}
          body: "Compiled from source tag: ${{ steps.resolve.outputs.tag }}"
          files: |
            Libbox.xcframework.zip
            sing-box-*.tipa
